<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { font-family: sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <div class="max-w-3xl mx-auto p-4">
    <div class="bg-white/5 border border-white/10 rounded-3xl overflow-hidden shadow-2xl">

      <!-- Top Bar -->
      <div class="flex items-center justify-between px-5 py-4 bg-black/20 border-b border-white/10">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-r from-purple-500 to-blue-500 flex items-center justify-center">
            <i class="fas fa-user text-white"></i>
          </div>
          <div>
            <h1 class="font-bold text-lg">My Profile</h1>
            <p class="text-xs text-slate-400">Prinaince Library</p>
          </div>
        </div>

        <button onclick="logout()" class="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-500 transition text-sm font-semibold">
          Logout
        </button>
      </div>

      <!-- Profile Header -->
      <div class="bg-gradient-to-r from-purple-600 to-blue-600 p-8 text-center">
        <div id="userAvatar" class="w-24 h-24 mx-auto rounded-full bg-white text-purple-700 flex items-center justify-center text-4xl font-bold border-4 border-white/30 shadow-lg">
          ?
        </div>
        <h2 id="userName" class="text-2xl font-bold mt-4">Loading...</h2>
        <p id="userEmail" class="text-purple-100 text-sm mt-1 break-all">Please wait...</p>

        <div id="planBadge" class="inline-block mt-4 px-4 py-1 rounded-full bg-white/20 text-sm font-semibold">
          Loading Plan...
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-3 divide-x divide-white/10 bg-white/5">
        <div class="p-4 text-center">
          <p id="daysActive" class="text-2xl font-bold">0</p>
          <p class="text-xs text-slate-400">Days Active</p>
        </div>
        <div class="p-4 text-center">
          <p id="userStatusDisplay" class="text-2xl font-bold">...</p>
          <p class="text-xs text-slate-400">Status</p>
        </div>
        <div class="p-4 text-center">
          <p id="planText" class="text-2xl font-bold">...</p>
          <p class="text-xs text-slate-400">Plan</p>
        </div>
      </div>

      <!-- Details -->
      <div class="p-6 space-y-4">
        <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
          <p class="text-slate-400 text-xs uppercase">Full Name</p>
          <p id="detailName" class="text-white font-medium mt-1">...</p>
        </div>

        <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
          <p class="text-slate-400 text-xs uppercase">Email</p>
          <p id="detailEmail" class="text-white font-medium mt-1 break-all">...</p>
        </div>

        <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
          <p class="text-slate-400 text-xs uppercase">Member Since</p>
          <p id="detailDate" class="text-white font-medium mt-1">...</p>
        </div>

        <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
          <p class="text-slate-400 text-xs uppercase">Current Plan</p>
          <p id="detailPlan" class="text-white font-medium mt-1">...</p>
        </div>

        <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
          <p class="text-slate-400 text-xs uppercase">Subscription Ends</p>
          <p id="detailExpiry" class="text-white font-medium mt-1">...</p>
        </div>

        <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
          <p class="text-slate-400 text-xs uppercase">User ID</p>
          <p id="detailUID" class="text-slate-300 font-mono text-xs mt-1 break-all">...</p>
        </div>
      </div>

      <!-- Bottom Buttons -->
      <div class="p-6 pt-0">
        <div class="grid grid-cols-2 gap-3">
          <button onclick="reloadProfile()" class="bg-blue-600 hover:bg-blue-500 rounded-xl py-3 font-semibold transition">
            Refresh
          </button>
          <button onclick="logout()" class="bg-red-600 hover:bg-red-500 rounded-xl py-3 font-semibold transition">
            Logout
          </button>
        </div>
      </div>

    </div>

    <p class="text-center text-slate-500 text-xs mt-6">Prinaince Library Profile Panel</p>
  </div>

  <script>
    const SUPABASE_URL = "https://weunyluildqsgbsmmawi.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndldW55bHVpbGRxc2dic21tYXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MTQ1MTAsImV4cCI6MjA4NTA5MDUxMH0.MpC1WcT120r59MPz_Bt8CBnXjTusajlu4OPmd_6KHkw";

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const uid = params.get("uid");

    async function loadProfile() {
      if (!uid) {
        document.body.innerHTML = "<div style='padding:20px;color:white;text-align:center'>UID missing in URL</div>";
        return;
      }

      const { data, error } = await sb
        .from("users")
        .select("*")
        .eq("id", uid)
        .single();

      if (error || !data) {
        document.body.innerHTML = "<div style='padding:20px;color:white;text-align:center'>Failed to load profile</div>";
        return;
      }

      const user = data;

      document.getElementById("userName").textContent = user.name || "Unknown User";
      document.getElementById("userEmail").textContent = user.email || "No Email";
      document.getElementById("detailName").textContent = user.name || "Unknown User";
      document.getElementById("detailEmail").textContent = user.email || "No Email";
      document.getElementById("detailUID").textContent = user.id || "-";

      const firstLetter = (user.name || user.email || "U").charAt(0).toUpperCase();
      document.getElementById("userAvatar").textContent = firstLetter;

      if (user.created_at) {
        const createdDate = new Date(user.created_at);
        const today = new Date();
        const diffTime = Math.abs(today - createdDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById("daysActive").textContent = diffDays;
        document.getElementById("detailDate").textContent = createdDate.toLocaleDateString("en-IN", {
          year: "numeric",
          month: "long",
          day: "numeric"
        });
      } else {
        document.getElementById("daysActive").textContent = "1";
        document.getElementById("detailDate").textContent = "Today";
      }

      const blocked = user.is_blocked === true;
      const statusText = blocked ? "Blocked" : "Active";
      document.getElementById("userStatusDisplay").textContent = statusText;
      document.getElementById("userStatusDisplay").className = blocked
        ? "text-2xl font-bold text-red-400"
        : "text-2xl font-bold text-green-400";

      const plan = user.plan_status ? user.plan_status.toUpperCase() : "TRIAL";
      document.getElementById("planText").textContent = plan;
      document.getElementById("detailPlan").textContent = plan;

      const badge = document.getElementById("planBadge");
      badge.textContent = plan + " MEMBER";
      badge.className = "inline-block mt-4 px-4 py-1 rounded-full text-sm font-semibold ";
      if (plan === "ACTIVE") {
        badge.className += "bg-green-500/20 text-green-300";
      } else if (plan === "TRIAL") {
        badge.className += "bg-yellow-500/20 text-yellow-300";
      } else {
        badge.className += "bg-red-500/20 text-red-300";
      }

      let expiryText = "Not Available";
      if (user.subscription_end_at) {
        expiryText = new Date(user.subscription_end_at).toLocaleString("en-IN");
      } else if (user.trial_end_at) {
        expiryText = new Date(user.trial_end_at).toLocaleString("en-IN");
      }
      document.getElementById("detailExpiry").textContent = expiryText;
    }

    function reloadProfile() {
      loadProfile();
    }

    function logout() {
      // App ko custom URL bhej raha hai
      window.location.href = "app://logout";
    }

    window.onload = loadProfile;
  </script>
</body>
</html>
