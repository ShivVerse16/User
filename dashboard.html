<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Smooth Loading Animation */
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 min-h-screen text-slate-200">
    
    <!-- Navigation Bar -->
    <nav class="bg-black/20 backdrop-blur-xl border-b border-white/10 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-purple-500 to-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                    <i class="fas fa-layer-group text-white text-lg"></i>
                </div>
                <span class="text-white font-bold text-xl tracking-tight">Prinaince<span class="text-purple-400">Library</span></span>
            </div>
            <button onclick="logout()" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 px-4 py-2 rounded-xl transition border border-red-500/20 flex items-center gap-2 text-sm font-medium">
                <i class="fas fa-power-off"></i>
                <span>Exit</span>
            </button>
        </div>
    </nav>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950 z-40 flex items-center justify-center">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-purple-500/30 border-t-purple-500 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-purple-300 animate-pulse">Fetching Profile...</p>
        </div>
    </div>

    <div class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto space-y-6">
            
            <!-- Profile Card -->
            <div class="bg-white/5 backdrop-blur-2xl rounded-[2.5rem] border border-white/10 overflow-hidden shadow-2xl">
                
                <!-- Profile Header -->
                <div class="bg-gradient-to-br from-purple-600/20 to-blue-600/20 p-10 text-center border-b border-white/5 relative">
                    <div id="userAvatar" class="w-28 h-28 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl font-bold text-white shadow-2xl border-4 border-white/10">
                        ?
                    </div>
                    <h2 id="userName" class="text-3xl font-extrabold text-white mb-1 tracking-tight">Loading...</h2>
                    <p id="userEmail" class="text-slate-400 font-medium"></p>
                    
                    <!-- Subscription Badge -->
                    <div id="planBadge" class="mt-4 inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest bg-purple-500/20 text-purple-300 border border-purple-500/30">
                        Checking Plan...
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="grid grid-cols-3 divide-x divide-white/5 bg-white/5 border-b border-white/5">
                    <div class="p-6 text-center">
                        <div class="text-2xl font-bold text-white mb-1" id="daysActive">0</div>
                        <div class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">Days Active</div>
                    </div>
                    <div class="p-6 text-center">
                        <div class="text-2xl font-bold text-emerald-400 mb-1">
                            <i class="fas fa-shield-check"></i>
                        </div>
                        <div class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">Verified</div>
                    </div>
                    <div class="p-6 text-center">
                        <div class="text-2xl font-bold text-white mb-1" id="userStatusDisplay">...</div>
                        <div class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">Status</div>
                    </div>
                </div>

                <!-- Account Details -->
                <div class="p-8 space-y-4">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-white font-bold flex items-center gap-2">
                            <i class="fas fa-id-card text-purple-500"></i>
                            Account Information
                        </h3>
                    </div>
                    
                    <div class="space-y-3">
                        <div class="flex items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                            <i class="fas fa-calendar-alt w-10 text-purple-400"></i>
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase font-bold">Member Since</p>
                                <p id="detailDate" class="text-slate-200 font-medium">Loading...</p>
                            </div>
                        </div>

                        <div class="flex items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                            <i class="fas fa-gem w-10 text-blue-400"></i>
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase font-bold">Current Plan</p>
                                <p id="detailPlan" class="text-slate-200 font-medium">Fetching status...</p>
                            </div>
                        </div>

                        <div class="flex items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                            <i class="fas fa-fingerprint w-10 text-emerald-400"></i>
                            <div class="truncate">
                                <p class="text-[10px] text-slate-500 uppercase font-bold">User System ID</p>
                                <p id="detailUID" class="text-slate-400 text-xs font-mono truncate"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center space-y-2 opacity-40">
                <p class="text-xs font-medium tracking-widest">PRINAINCE LIBRARY SECURED</p>
                <p class="text-[10px]">© 2025 • Version 2.0.4</p>
            </div>
        </div>
    </div>

    <script>
        // Supabase Init
        const SUPABASE_URL = 'https://weunyluildqsgbsmmawi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndldW55bHVpbGRxc2dic21tYXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MTQ1MTAsImV4cCI6MjA4NTA5MDUxMH0.MpC1WcT120r59MPz_Bt8CBnXjTusajlu4OPmd_6KHkw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. URL se ID pakadna
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('uid');

        async function loadProfile() {
            if (!userId) {
                document.body.innerHTML = "<div class='flex h-screen items-center justify-center text-white'>Error: No UID provided</div>";
                return;
            }

            try {
                // 2. Supabase se User Fetch karna
                const { data: user, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (error || !user) throw error;

                // 3. UI Update karna
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
                document.getElementById('detailUID').textContent = user.id;
                
                // Status Logic
                const status = user.is_blocked ? 'Blocked' : 'Active';
                document.getElementById('userStatusDisplay').textContent = status;
                document.getElementById('detailStatus').textContent = user.is_blocked ? 'Account Restricted' : 'Verified & Active';
                
                // Plan Logic
                const plan = user.plan_status || 'trial';
                document.getElementById('planBadge').textContent = plan + " Member";
                document.getElementById('detailPlan').textContent = plan.toUpperCase();
                
                // Days Active Calculation
                const createdDate = new Date(user.created_at);
                const diff = Math.ceil((new Date() - createdDate) / (1000 * 60 * 60 * 24));
                document.getElementById('daysActive').textContent = diff;
                document.getElementById('detailDate').textContent = createdDate.toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });

                // Hide Loading
                document.getElementById('loadingOverlay').style.display = 'none';

            } catch (err) {
                console.error(err);
                alert("Failed to load profile. Please login again.");
            }
        }

        function logout() {
            // App ko batane ke liye ki logout hona hai
            window.location.href = "logout://now";
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
